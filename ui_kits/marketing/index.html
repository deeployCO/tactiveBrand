<!doctype html>
<html data-screen-label="Marketing Home">
<head>
<meta charset="utf-8">
<title>Tactive — Marketing UI Kit</title>
<link rel="icon" href="../../assets/favicon.svg">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg-2)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .btn-pink{background:var(--tac-pink-500);color:#fff;border:0;border-radius:8px;padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 8px 24px rgba(233,26,79,.25);transition:all .2s cubic-bezier(.22,1,.36,1)}
  .btn-pink:hover{transform:translateY(-1px);box-shadow:0 12px 32px rgba(233,26,79,.32)}
  .btn-pink.btn-lg{padding:14px 22px;font-size:15px}
  .btn-ghost{background:transparent;color:var(--tac-navy-900);border:0;padding:10px 8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel">
  function App(){
    React.useEffect(()=>{lucide.createIcons();});
    return (<>
      <Nav/><Hero/><ThreeModes/><Coverage/><CompareSection/><CTA/><Footer/>
    </>);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>
