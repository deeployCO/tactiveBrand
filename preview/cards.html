<!doctype html>
<html><head><meta charset="utf-8"><title>Cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--bg-2);font-family:Inter}.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}.card{background:#fff;border:1px solid #E6EAF0;border-radius:12px;padding:18px;box-shadow:0 1px 2px rgba(15,27,45,.04),0 1px 3px rgba(15,27,45,.06)}.eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#E91A4F;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}.eyebrow .d{width:6px;height:6px;border-radius:999px;background:#E91A4F}.h{font-size:18px;font-weight:600;color:#0F1B2D;margin:0 0 4px;letter-spacing:-.01em}.b{font-size:14px;color:#6B7B91;line-height:1.5}.elev{box-shadow:0 12px 32px rgba(15,27,45,.08),0 4px 8px rgba(15,27,45,.05)}</style></head>
<body>
<div class="grid">
  <div class="card"><div class="eyebrow"><span class="d"></span>01 / DETECT</div><div class="h">Scans the open web</div><div class="b">Continuous monitoring across Meta, Google, TikTok, and the open web.</div></div>
  <div class="card elev"><div class="eyebrow"><span class="d"></span>02 / DECIDE</div><div class="h">Classifies threats</div><div class="b">Every signal scored on severity, confidence, and likely intent.</div></div>
  <div class="card" style="background:#0F1B2D;border-color:#0F1B2D"><div class="eyebrow" style="color:#FF6E92"><span class="d" style="background:#FF6E92"></span>03 / ACT</div><div class="h" style="color:#fff">Files takedowns</div><div class="b" style="color:#C9D0DA">Submits through platform APIs and pauses compromised campaigns.</div></div>
</div>
</body></html>
