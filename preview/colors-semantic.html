<!doctype html>
<html><head><meta charset="utf-8"><title>Semantic</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg-2)}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .item{border:1px solid var(--border-1);border-radius:10px;overflow:hidden;background:#fff}
  .bar{height:56px}
  .body{padding:10px 12px;display:flex;justify-content:space-between;align-items:center}
  .name{font-size:13px;font-weight:600}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--fg-3)}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;padding:3px 8px;border-radius:999px;font-weight:600}
  .chip .d{width:6px;height:6px;border-radius:999px}
</style></head>
<body>
<div class="row">
  <div class="item">
    <div class="bar" style="background:#1FA971"></div>
    <div class="body"><div><div class="name">success</div><div class="hex">#1FA971</div></div><span class="chip" style="background:#E6F7EF;color:#1FA971"><span class="d" style="background:#1FA971"></span>defended</span></div>
  </div>
  <div class="item">
    <div class="bar" style="background:#E89923"></div>
    <div class="body"><div><div class="name">warn</div><div class="hex">#E89923</div></div><span class="chip" style="background:#FFF4E0;color:#B57212"><span class="d" style="background:#E89923"></span>review</span></div>
  </div>
  <div class="item">
    <div class="bar" style="background:#E91A4F"></div>
    <div class="body"><div><div class="name">danger</div><div class="hex">#E91A4F</div></div><span class="chip" style="background:#FFE3EC;color:#E91A4F"><span class="d" style="background:#E91A4F"></span>threat</span></div>
  </div>
  <div class="item">
    <div class="bar" style="background:#2563D9"></div>
    <div class="body"><div><div class="name">info</div><div class="hex">#2563D9</div></div><span class="chip" style="background:#E3EEFF;color:#2563D9"><span class="d" style="background:#2563D9"></span>scanning</span></div>
  </div>
</div>
</body></html>
