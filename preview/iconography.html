<!doctype html>
<html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>body{margin:0;padding:20px;background:var(--bg-2);font-family:Inter}.grid{display:grid;grid-template-columns:repeat(8,1fr);gap:10px}.cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;border:1px solid #E6EAF0;border-radius:10px;color:#0F1B2D;gap:6px}.cell .l{font-size:10px;color:#6B7B91;font-family:'JetBrains Mono',monospace}.cell.acc{color:#E91A4F}</style></head>
<body>
<div class="grid">
  <div class="cell"><i data-lucide="shield" stroke-width="1.75"></i><span class="l">shield</span></div>
  <div class="cell"><i data-lucide="eye" stroke-width="1.75"></i><span class="l">eye</span></div>
  <div class="cell"><i data-lucide="radar" stroke-width="1.75"></i><span class="l">radar</span></div>
  <div class="cell"><i data-lucide="target" stroke-width="1.75"></i><span class="l">target</span></div>
  <div class="cell"><i data-lucide="link-2-off" stroke-width="1.75"></i><span class="l">link-off</span></div>
  <div class="cell"><i data-lucide="gavel" stroke-width="1.75"></i><span class="l">gavel</span></div>
  <div class="cell acc"><i data-lucide="circle-alert" stroke-width="1.75"></i><span class="l" style="color:#E91A4F">alert</span></div>
  <div class="cell"><i data-lucide="arrow-right" stroke-width="1.75"></i><span class="l">arrow</span></div>
</div>
<script>lucide.createIcons();</script>
</body></html>
