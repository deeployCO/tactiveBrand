<!doctype html>
<html><head><meta charset="utf-8"><title>Radii & shadow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--bg-2);font-family:Inter}.row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}.cell{height:100px;background:#fff;border:1px solid var(--border-1);display:flex;align-items:flex-end;justify-content:center;padding:10px;font-size:11px;color:#6B7B91;font-family:'JetBrains Mono',monospace}.k{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#6B7B91;font-weight:600;margin:14px 0 8px}</style></head>
<body>
<div class="k">Radii</div>
<div class="row">
  <div class="cell" style="border-radius:4px">4 · xs</div>
  <div class="cell" style="border-radius:8px">8 · sm</div>
  <div class="cell" style="border-radius:12px">12 · md</div>
  <div class="cell" style="border-radius:16px">16 · lg</div>
  <div class="cell" style="border-radius:24px">24 · xl</div>
</div>
<div class="k">Shadows</div>
<div class="row">
  <div class="cell" style="border:0;border-radius:12px;box-shadow:0 1px 2px rgba(15,27,45,.04),0 1px 3px rgba(15,27,45,.06)">shadow-1</div>
  <div class="cell" style="border:0;border-radius:12px;box-shadow:0 4px 12px rgba(15,27,45,.06),0 2px 4px rgba(15,27,45,.04)">shadow-2</div>
  <div class="cell" style="border:0;border-radius:12px;box-shadow:0 12px 32px rgba(15,27,45,.08),0 4px 8px rgba(15,27,45,.05)">shadow-3</div>
  <div class="cell" style="border:0;border-radius:12px;box-shadow:0 24px 60px rgba(15,27,45,.12),0 8px 16px rgba(15,27,45,.06)">shadow-4</div>
  <div class="cell" style="border:0;border-radius:12px;box-shadow:0 8px 24px rgba(233,26,79,.25);background:#E91A4F;color:#fff">shadow-pink</div>
</div>
</body></html>
