<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--bg-2);font-family:Inter}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px}.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:8px;font-size:14px;font-weight:600;border:1px solid transparent;cursor:pointer;transition:all .2s cubic-bezier(.22,1,.36,1)}.btn-primary{background:#0F1B2D;color:#fff}.btn-primary:hover{background:#1E3050}.btn-pink{background:#E91A4F;color:#fff;box-shadow:0 8px 24px rgba(233,26,79,.25)}.btn-secondary{background:#fff;color:#0F1B2D;border-color:#E6EAF0}.btn-ghost{background:transparent;color:#0F1B2D}.btn-sm{padding:7px 12px;font-size:13px}.btn-lg{padding:14px 24px;font-size:16px}.k{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#6B7B91;font-weight:600;margin-bottom:8px}</style></head>
<body>
<div class="k">Primary actions</div>
<div class="row">
  <button class="btn btn-pink">Run my audit →</button>
  <button class="btn btn-primary">Connect account</button>
  <button class="btn btn-secondary">See pricing</button>
  <button class="btn btn-ghost">Cancel</button>
</div>
<div class="k">Sizes</div>
<div class="row">
  <button class="btn btn-pink btn-sm">Small →</button>
  <button class="btn btn-pink">Default →</button>
  <button class="btn btn-pink btn-lg">Large →</button>
  <button class="btn btn-primary" disabled style="opacity:.4;cursor:not-allowed">Disabled</button>
</div>
</body></html>
