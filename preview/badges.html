<!doctype html>
<html><head><meta charset="utf-8"><title>Badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--bg-2);font-family:Inter}.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:600}.chip .d{width:6px;height:6px;border-radius:999px}.chip .pulse{animation:p 1.6s ease-in-out infinite}@keyframes p{0%,100%{opacity:1}50%{opacity:.4}}.k{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#6B7B91;font-weight:600;margin-bottom:8px}.tag{display:inline-flex;padding:3px 8px;border:1px solid #E6EAF0;border-radius:6px;font-size:11px;font-weight:500;color:#3A4A60;font-family:'JetBrains Mono',monospace}</style></head>
<body>
<div class="k">Status</div>
<div class="row">
  <span class="chip" style="background:#FFE3EC;color:#E91A4F"><span class="d pulse" style="background:#E91A4F"></span>Threat detected</span>
  <span class="chip" style="background:#E6F7EF;color:#1FA971"><span class="d" style="background:#1FA971"></span>Defended</span>
  <span class="chip" style="background:#FFF4E0;color:#B57212"><span class="d" style="background:#E89923"></span>Review</span>
  <span class="chip" style="background:#E3EEFF;color:#2563D9"><span class="d" style="background:#2563D9"></span>Scanning</span>
  <span class="chip" style="background:#F2F4F7;color:#3A4A60"><span class="d" style="background:#6B7B91"></span>Idle</span>
</div>
<div class="k">Tags &amp; surfaces</div>
<div class="row">
  <span class="tag">meta_ads</span><span class="tag">google_search</span><span class="tag">tiktok</span><span class="tag">app_store</span><span class="tag">THR-2026-04829</span>
</div>
</body></html>
