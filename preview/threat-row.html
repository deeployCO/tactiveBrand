<!doctype html>
<html><head><meta charset="utf-8"><title>Threat row</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>body{margin:0;padding:18px;background:var(--bg-2);font-family:Inter}.row{display:flex;align-items:center;gap:14px;padding:14px 18px;background:#fff;border:1px solid #E6EAF0;border-radius:12px;margin-bottom:8px}.row+.row{box-shadow:0 1px 2px rgba(15,27,45,.04)}.icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex:none}.body{flex:1;min-width:0}.t{font-size:14px;font-weight:600;color:#0F1B2D;margin-bottom:2px}.s{font-size:12px;color:#6B7B91;font-family:'JetBrains Mono',monospace}.chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600}.chip .d{width:5px;height:5px;border-radius:999px}.btn{padding:7px 14px;background:#0F1B2D;color:#fff;border:0;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}</style></head>
<body>
<div class="row">
  <div class="icon" style="background:#FFE3EC;color:#E91A4F"><i data-lucide="circle-alert" stroke-width="1.75"></i></div>
  <div class="body"><div class="t">Cloned landing page on knockoff-acme.shop</div><div class="s">meta_ads · THR-2026-04829 · 2m ago</div></div>
  <span class="chip" style="background:#FFE3EC;color:#E91A4F"><span class="d" style="background:#E91A4F"></span>High</span>
  <button class="btn">File takedown →</button>
</div>
<div class="row">
  <div class="icon" style="background:#E6F7EF;color:#1FA971"><i data-lucide="shield-check" stroke-width="1.75"></i></div>
  <div class="body"><div class="t">Phishing domain auto-removed by agent</div><div class="s">google_search · THR-2026-04812 · 18m ago</div></div>
  <span class="chip" style="background:#E6F7EF;color:#1FA971"><span class="d" style="background:#1FA971"></span>Defended</span>
</div>
<script>lucide.createIcons();</script>
</body></html>
