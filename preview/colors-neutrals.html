<!doctype html>
<html><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg-2)}
  .row{display:grid;grid-template-columns:repeat(8,1fr);gap:10px}
  .sw{border-radius:10px;padding:14px;height:96px;display:flex;flex-direction:column;justify-content:flex-end;border:1px solid var(--border-1)}
  .sw .name{font-size:12px;font-weight:600}
  .sw .hex{font-family:var(--font-mono);font-size:11px;opacity:.7;margin-top:2px}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:#FFFFFF;color:#0F1B2D"><div class="name">white</div><div class="hex">#FFFFFF</div></div>
  <div class="sw" style="background:#FAFBFC;color:#0F1B2D"><div class="name">paper</div><div class="hex">#FAFBFC</div></div>
  <div class="sw" style="background:#F2F4F7;color:#0F1B2D"><div class="name">mist</div><div class="hex">#F2F4F7</div></div>
  <div class="sw" style="background:#E6EAF0;color:#0F1B2D"><div class="name">fog</div><div class="hex">#E6EAF0</div></div>
  <div class="sw" style="background:#C9D0DA;color:#0F1B2D"><div class="name">stone</div><div class="hex">#C9D0DA</div></div>
  <div class="sw" style="background:#6B7B91;color:#fff"><div class="name">slate</div><div class="hex">#6B7B91</div></div>
  <div class="sw" style="background:#3A4A60;color:#fff"><div class="name">graphite</div><div class="hex">#3A4A60</div></div>
  <div class="sw" style="background:#0F1B2D;color:#fff"><div class="name">navy-900</div><div class="hex">#0F1B2D</div></div>
</div>
</body></html>
