<!doctype html>
<html><head><meta charset="utf-8"><title>Brand colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg-2)}
  .row{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
  .sw{border-radius:10px;padding:14px;height:96px;display:flex;flex-direction:column;justify-content:flex-end;border:1px solid var(--border-1)}
  .sw .name{font-size:12px;font-weight:600}
  .sw .hex{font-family:var(--font-mono);font-size:11px;opacity:.7;margin-top:2px}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:#0F1B2D;color:#fff"><div class="name">navy-900</div><div class="hex">#0F1B2D</div></div>
  <div class="sw" style="background:#16243A;color:#fff"><div class="name">navy-800</div><div class="hex">#16243A</div></div>
  <div class="sw" style="background:#1E3050;color:#fff"><div class="name">navy-700</div><div class="hex">#1E3050</div></div>
  <div class="sw" style="background:#2A4368;color:#fff"><div class="name">navy-600</div><div class="hex">#2A4368</div></div>
  <div class="sw" style="background:#E91A4F;color:#fff"><div class="name">pink-500</div><div class="hex">#E91A4F</div></div>
  <div class="sw" style="background:#FF3D6E;color:#fff"><div class="name">pink-400</div><div class="hex">#FF3D6E</div></div>
  <div class="sw" style="background:#FFE3EC;color:#0F1B2D"><div class="name">pink-100</div><div class="hex">#FFE3EC</div></div>
</div>
</body></html>
