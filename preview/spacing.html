<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--bg-2);font-family:Inter}.scale{display:flex;align-items:flex-end;gap:8px;height:120px}.bar{background:#0F1B2D;border-radius:4px 4px 0 0;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;color:#fff;font-family:'JetBrains Mono',monospace;font-size:10px;padding-bottom:4px}</style></head>
<body>
<div style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#6B7B91;font-weight:600;margin-bottom:14px">Spacing scale · 4px base</div>
<div class="scale">
  <div class="bar" style="width:4px;height:4px"></div>
  <div class="bar" style="width:8px;height:8px"></div>
  <div class="bar" style="width:18px;height:12px">12</div>
  <div class="bar" style="width:24px;height:16px">16</div>
  <div class="bar" style="width:32px;height:24px">24</div>
  <div class="bar" style="width:40px;height:32px">32</div>
  <div class="bar" style="width:52px;height:48px">48</div>
  <div class="bar" style="width:64px;height:64px">64</div>
  <div class="bar" style="width:96px;height:96px">96</div>
</div>
</body></html>
